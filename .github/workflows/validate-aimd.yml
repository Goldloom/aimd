name: Validate AIMD Examples

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run AIMD Validator on Examples
      run: |
        # Find all .aimd files in the examples directory and validate them
        find examples/ -name "*.aimd" -exec python validators/validator.py {} \;
